<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Certificate | DigiTech Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="../css/style.css">
    <script src="../js/firebase-config.js"></script>
    <script src="../js/database-service.js"></script>
    <style>
        body { background: linear-gradient(135deg, #0A2540 0%, #1e3a5f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .verify-container { max-width: 600px; width: 100%; background: white; border-radius: 20px; padding: 50px 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .verify-header { text-align: center; margin-bottom: 40px; }
        .verify-icon { width: 100px; height: 100px; background: linear-gradient(135deg, var(--accent), var(--accent-light)); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
        .verify-icon i { font-size: 45px; color: white; }
        h1 { color: var(--primary); font-size: 2rem; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 1rem; }
        .verify-form { margin: 30px 0; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: var(--primary); margin-bottom: 8px; }
        input { width: 100%; padding: 15px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; transition: all 0.3s; }
        input:focus { outline: none; border-color: var(--accent); }
        .btn-verify { width: 100%; padding: 15px; background: var(--gradient-accent); border: none; border-radius: 10px; color: var(--dark); font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: all 0.3s; }
        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(245, 158, 11, 0.4); }
        .result { margin-top: 30px; padding: 25px; border-radius: 15px; display: none; }
        .result.valid { background: #d1fae5; border: 2px solid #10b981; color: #065f46; }
        .result.invalid { background: #fee2e2; border: 2px solid #ef4444; color: #991b1b; }
        .result-icon { font-size: 3rem; text-align: center; margin-bottom: 15px; }
        .result h2 { font-size: 1.5rem; margin-bottom: 10px; text-align: center; }
        .cert-details { background: white; padding: 20px; border-radius: 10px; margin-top: 15px; }
        .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e5e7eb; }
        .detail-label { font-weight: 600; color: #666; }
        .detail-value { color: var(--primary); font-weight: 600; }
        @media (max-width: 768px) {
            .verify-container { padding: 30px 20px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="verify-container">
        <div class="verify-header">
            <div class="verify-icon"><i class="fas fa-shield-alt"></i></div>
            <h1>Verify Certificate</h1>
            <p class="subtitle">Enter the certificate ID to verify its authenticity</p>
        </div>

        <form class="verify-form" onsubmit="verifyCert(event)">
            <div class="form-group">
                <label for="certId"><i class="fas fa-id-card"></i> Certificate ID</label>
                <input type="text" id="certId" placeholder="e.g., DTG-ABC123-XYZ789" required>
            </div>
            <button type="submit" class="btn-verify">
                <i class="fas fa-search"></i> Verify Certificate
            </button>
        </form>

        <div class="result" id="result"></div>
    </div>

    <script>
        async function verifyCert(e) {
            e.preventDefault();
            const certId = document.getElementById('certId').value.trim();
            const resultDiv = document.getElementById('result');
            
            resultDiv.style.display = 'none';
            
            try {
                const result = await verifyCertificate(certId);
                
                if (result.valid) {
                    const cert = result.certificate;
                    resultDiv.className = 'result valid';
                    resultDiv.innerHTML = `
                        <div class="result-icon"><i class="fas fa-check-circle"></i></div>
                        <h2>✓ Certificate Verified</h2>
                        <p style="text-align: center; margin-bottom: 15px;">This certificate is authentic and was issued by DigiTech Globals Academy.</p>
                        <div class="cert-details">
                            <div class="detail-row">
                                <span class="detail-label">Certificate ID:</span>
                                <span class="detail-value">${cert.certificateId}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Student Name:</span>
                                <span class="detail-value">${cert.studentName}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Course:</span>
                                <span class="detail-value">${cert.courseTitle}</span>
                            </div>
                            <div class="detail-row">
                                <span class="detail-label">Issued Date:</span>
                                <span class="detail-value">${new Date(cert.issuedDate).toLocaleDateString()}</span>
                            </div>
                            <div class="detail-row" style="border-bottom: none;">
                                <span class="detail-label">Status:</span>
                                <span class="detail-value">${cert.status === 'active' ? 'Active' : 'Inactive'}</span>
                            </div>
                        </div>
                    `;
                } else {
                    resultDiv.className = 'result invalid';
                    resultDiv.innerHTML = `
                        <div class="result-icon"><i class="fas fa-times-circle"></i></div>
                        <h2>✗ Verification Failed</h2>
                        <p style="text-align: center;">${result.message || 'Certificate not found or invalid.'}</p>
                    `;
                }
                resultDiv.style.display = 'block';
            } catch (error) {
                resultDiv.className = 'result invalid';
                resultDiv.innerHTML = `
                    <div class="result-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <h2>Error</h2>
                    <p style="text-align: center;">Unable to verify certificate. Please try again later.</p>
                `;
                resultDiv.style.display = 'block';
            }
        }
    </script>
</body>
</html>
