<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Admin Account | DigiTech Academy</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #0A2540 0%, #1e3a5f 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 600px; background: white; border-radius: 12px; padding: 40px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        h1 { color: #0A2540; margin: 0 0 10px 0; font-size: 28px; }
        p { color: #666; margin: 0 0 30px 0; }
        .warning { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 16px; border-radius: 8px; margin-bottom: 30px; color: #92400e; }
        button { width: 100%; padding: 16px; background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37,99,235,0.3); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .success { background: #d1fae5; border-left: 4px solid #10b981; padding: 16px; border-radius: 8px; margin-top: 20px; color: #065f46; display: none; }
        .error { background: #fee2e2; border-left: 4px solid #ef4444; padding: 16px; border-radius: 8px; margin-top: 20px; color: #991b1b; display: none; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; color: #374151; margin-bottom: 8px; font-size: 14px; }
        .form-control { width: 100%; padding: 12px 16px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        .info { background: #e0f2fe; border-left: 4px solid #0284c7; padding: 16px; border-radius: 8px; margin-top: 20px; color: #075985; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #2563eb; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛠️ Create Admin Account</h1>
        <p>Set up the initial admin account for DigiTech Academy</p>

        <div class="warning">
            <strong>⚠️ Important:</strong> Only run this once to create the first admin account. After creation, use the admin dashboard to manage additional admin users.
        </div>

        <form id="adminForm">
            <div class="form-group">
                <label>Admin Email</label>
                <input type="email" class="form-control" id="adminEmail" value="admin@digitechglobals.com" required>
            </div>

            <div class="form-group">
                <label>Admin Password (min 6 characters)</label>
                <input type="password" class="form-control" id="adminPassword" value="Admin@123456" required minlength="6">
            </div>

            <div class="form-group">
                <label>First Name</label>
                <input type="text" class="form-control" id="firstName" value="Admin" required>
            </div>

            <div class="form-group">
                <label>Last Name</label>
                <input type="text" class="form-control" id="lastName" value="User" required>
            </div>

            <button type="submit">Create Admin Account</button>
        </form>

        <div class="success" id="successMessage"></div>
        <div class="error" id="errorMessage"></div>

        <div class="info" id="infoMessage" style="display: none;"></div>

        <div class="back-link">
            <a href="login.html">← Back to Login</a>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <!-- Firebase Configuration & Services -->
    <script src="../js/firebase-config.js"></script>
    <script src="../js/auth-service.js"></script>
    <script src="../js/database-service.js"></script>

    <script>
        document.getElementById('adminForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = this.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '⏳ Creating admin account...';

            // Hide previous messages
            document.getElementById('successMessage').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('infoMessage').style.display = 'none';

            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;

            try {
                // Create Firebase Auth account
                const userCredential = await firebaseAuth.createUserWithEmailAndPassword(email, password);
                const adminUserId = userCredential.user.uid;

                // Create admin profile in Firestore
                await firebaseDB.collection('userProfiles').doc(adminUserId).set({
                    userId: adminUserId,
                    email: email,
                    firstName: firstName,
                    lastName: lastName,
                    role: 'admin',
                    applicationId: null,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Show success
                const successMsg = document.getElementById('successMessage');
                successMsg.innerHTML = `
                    <strong>✅ Success!</strong> Admin account created.<br>
                    <strong>User ID:</strong> ${adminUserId}<br>
                    <strong>Email:</strong> ${email}<br>
                    <br>
                    You can now login at the <a href="login.html">login page</a>.
                `;
                successMsg.style.display = 'block';

                // Show info
                const infoMsg = document.getElementById('infoMessage');
                infoMsg.innerHTML = `
                    <strong>📝 Next Steps:</strong><br>
                    1. Go to the <a href="login.html">login page</a><br>
                    2. Login with the credentials above<br>
                    3. You will be redirected to the admin dashboard<br>
                    4. Change your password in the admin dashboard
                `;
                infoMsg.style.display = 'block';

                // Disable form
                this.style.opacity = '0.5';
                this.style.pointerEvents = 'none';

            } catch (error) {
                console.error('Error creating admin:', error);
                
                const errorMsg = document.getElementById('errorMessage');
                if (error.code === 'auth/email-already-in-use') {
                    errorMsg.innerHTML = `
                        <strong>ℹ️ Account Already Exists</strong><br>
                        An admin account with this email already exists.<br>
                        Go to the <a href="login.html">login page</a> to sign in.
                    `;
                } else {
                    errorMsg.innerHTML = `<strong>❌ Error:</strong> ${error.message}`;
                }
                errorMsg.style.display = 'block';

                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        });
    </script>
</body>
</html>
