<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment | DigiTech Academy</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body { background: #0A2540; font-family: Poppins, sans-serif; }
        .payment-container { max-width: 600px; margin: 80px auto; padding: 40px; background: white; border-radius: 12px; }
        .payment-header { text-align: center; margin-bottom: 30px; }
        .payment-header h1 { color: #0A2540; font-size: 28px; margin-bottom: 10px; }
        .payment-methods { margin: 30px 0; }
        .payment-option { border: 2px solid #e5e7eb; padding: 20px; border-radius: 8px; margin-bottom: 15px; cursor: pointer; transition: all 0.3s; }
        .payment-option:hover { border-color: #2563eb; background: #f8fafc; }
        .payment-option input { margin-right: 10px; }
        .amount-display { background: #f8f9fa; padding: 20px; border-radius: 8px; margin: 20px 0; text-align: center; }
        .amount-display .amount { font-size: 36px; font-weight: 700; color: #2563eb; }
        .pay-btn { width: 100%; padding: 16px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
        .pay-btn:hover { background: #1d4ed8; }
        .pay-btn:disabled { background: #9ca3af; cursor: not-allowed; }
        .security-note { text-align: center; color: #6b7280; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="payment-container">
        <div class="payment-header">
            <h1><i class="fas fa-credit-card"></i> Secure Payment</h1>
            <p>Complete your course enrollment</p>
        </div>
        
        <div class="amount-display">
            <div style="color: #6b7280; font-size: 14px; margin-bottom: 5px;">Total Amount</div>
            <div class="amount" id="amount">$0</div>
        </div>
        
        <div class="payment-methods">
            <h3 style="margin-bottom: 15px; color: #0A2540;">Select Payment Method</h3>
            
            <label class="payment-option">
                <input type="radio" name="paymentMethod" value="card" checked>
                <i class="fas fa-credit-card" style="color: #2563eb;"></i>
                <strong>Credit/Debit Card</strong>
                <div style="font-size: 12px; color: #6b7280; margin-left: 24px;">Visa, Mastercard, Amex</div>
            </label>
            
            <label class="payment-option">
                <input type="radio" name="paymentMethod" value="paypal">
                <i class="fab fa-paypal" style="color: #0070ba;"></i>
                <strong>PayPal</strong>
                <div style="font-size: 12px; color: #6b7280; margin-left: 24px;">Pay with your PayPal account</div>
            </label>
            
            <label class="payment-option">
                <input type="radio" name="paymentMethod" value="bank">
                <i class="fas fa-university" style="color: #059669;"></i>
                <strong>Bank Transfer</strong>
                <div style="font-size: 12px; color: #6b7280; margin-left: 24px;">Direct bank transfer</div>
            </label>
        </div>
        
        <button id="payBtn" class="pay-btn">
            <i class="fas fa-lock"></i> Complete Payment
        </button>
        
        <div class="security-note">
            <i class="fas fa-shield-alt"></i> Your payment is secured with SSL encryption
        </div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    
    <script>
    const urlParams = new URLSearchParams(window.location.search);
    const amount = parseFloat(urlParams.get('amount'));
    const courseId = urlParams.get('course');
    const email = urlParams.get('email');
    
    document.getElementById('amount').textContent = '$' + amount;
    
    document.getElementById('payBtn').addEventListener('click', async () => {
        const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;
        const btn = document.getElementById('payBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing Payment...';
        
        try {
            if (paymentMethod === 'card') {
                const registrationData = JSON.parse(sessionStorage.getItem('pendingRegistration'));
                
                // For now, redirect to contact for Stripe setup
                // Once you create products in Stripe Dashboard, we'll use Payment Links
                const message = `STRIPE PAYMENT READY!\n\n` +
                    `Your Stripe account is connected.\n\n` +
                    `To complete setup:\n` +
                    `1. Go to dashboard.stripe.com/products\n` +
                    `2. Create products for each course\n` +
                    `3. I'll integrate the payment links\n\n` +
                    `For now, please email to complete payment:\n` +
                    `billing@digitechglobals.com\n\n` +
                    `Course: ${courseId}\n` +
                    `Amount: $${amount}\n` +
                    `Student: ${registrationData.email}`;
                
                alert(message);
                
                // Store payment intent
                sessionStorage.setItem('paymentPending', JSON.stringify({
                    courseId, amount, email, 
                    timestamp: new Date().toISOString()
                }));
                
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Complete Payment';
                
            } else if (paymentMethod === 'paypal') {
                alert('PayPal: Contact info@digitechglobals.com\n\nCourse: ' + courseId + '\nAmount: $' + amount);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Complete Payment';
                
            } else if (paymentMethod === 'bank') {
                alert('Bank Transfer: Contact billing@digitechglobals.com\n\nCourse: ' + courseId + '\nAmount: $' + amount);
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-lock"></i> Complete Payment';
            }
            
        } catch (error) {
            console.error('Payment error:', error);
            alert('Error: ' + error.message);
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-lock"></i> Complete Payment';
        }
    });
    </script>
</body>
</html>
